name: Mess Management System - CI/CD Pipeline

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: mess-management-system
  AWS_REGION: us-east-1
  NODE_VERSION: '18'

jobs:
  # Job 1: Code Quality & Testing
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run Linting
        run: npm run lint || echo "⚠️  No lint script found, skipping..."
        continue-on-error: true
      
      - name: Run Tests
        run: npm test || echo "⚠️  No test script found, skipping..."
        continue-on-error: true
      
      - name: Check for Security Vulnerabilities
        run: npm audit --production || echo "⚠️  Security vulnerabilities detected"
        continue-on-error: true

  # Job 2: Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest
      
      - name: Test Docker Image
        run: |
          docker run -d -p 3000:3000 \
            -e PORT=3000 \
            -e DATABASE_URL=postgres://test:test@localhost:5432/testdb \
            -e JWT_SECRET=test-secret \
            --name test-container ${{ env.DOCKER_IMAGE }}:latest
          sleep 10
          curl -f http://localhost:3000 || echo "⚠️  Health check failed"
          docker stop test-container
          docker rm test-container
      
      - name: Save Docker Image as Artifact
        run: docker save ${{ env.DOCKER_IMAGE }}:latest -o mess-app-image.tar
      
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: mess-app-image.tar
          retention-days: 1

  # Job 3: Deploy to AWS EC2 (Only on main branch)
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image
      
      - name: Load Docker Image
        run: docker load -i mess-app-image.tar
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to EC2
        run: |
          # Copy files to EC2
          scp -i ~/.ssh/ec2_key.pem docker-compose.yml ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/
          scp -i ~/.ssh/ec2_key.pem Dockerfile ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/
          scp -i ~/.ssh/ec2_key.pem -r src public package*.json ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/
          
          # Connect to EC2 and deploy
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            # Pull latest code
            cd ~/
            
            # Stop existing containers
            docker-compose down || true
            
            # Remove old images
            docker image prune -f
            
            # Rebuild and start containers
            docker-compose up -d --build
            
            # Show running containers
            docker ps
            
            # Check application health
            sleep 15
            curl -f http://localhost:3000 && echo "✅ Application deployed successfully!" || echo "❌ Deployment failed!"
          ENDSSH
      
      - name: Cleanup
        run: rm -f ~/.ssh/ec2_key.pem

  # Job 4: Notification
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to EC2 successful!"
          else
            echo "❌ Deployment failed or was skipped"
          fi
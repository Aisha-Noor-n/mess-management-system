name: Mess Management System - CI/CD Pipeline

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: mess-management-system
  AWS_REGION: us-east-1
  NODE_VERSION: '18'

jobs:

  # Job 1: Code Quality & Testing
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint || echo "No lint script found, skipping..."
        continue-on-error: true

      - name: Run Tests
        run: npm test || echo "No test script found, skipping..."
        continue-on-error: true

      - name: Check for Security Vulnerabilities
        run: npm audit --production || echo "Security vulnerabilities detected"
        continue-on-error: true

  # Job 2: Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Test Docker Image
        run: |
          docker run -d -p 3000:3000 \
            -e PORT=3000 \
            -e DATABASE_URL=postgres://test:test@localhost:5432/testdb \
            -e JWT_SECRET=test-secret \
            --name test-container ${{ env.DOCKER_IMAGE }}:latest
          sleep 10
          curl -f http://localhost:3000 || echo "Health check failed"
          docker stop test-container && docker rm test-container

      - name: Save Docker Image as Artifact
        run: docker save ${{ env.DOCKER_IMAGE }}:latest -o mess-app-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: mess-app-image.tar
          retention-days: 1

  # Job 3: Deploy to AWS EC2 (Only on main branch)
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i mess-app-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # FIXED: Use webfactory/ssh-agent instead of manual echo > file
      # This correctly handles PEM newlines and loads the key into the SSH agent
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # FIXED: Dedicated step for known_hosts before any SSH/SCP commands
      - name: Add EC2 to Known Hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -T 60 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # FIXED: No -i flag needed — ssh-agent handles auth automatically
      - name: Deploy to EC2
        run: |
          scp docker-compose.yml ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/
          scp Dockerfile ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/
          scp -r src public package*.json ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/

          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            cd ~/
            docker-compose down || true
            docker image prune -f
            docker-compose up -d --build
            docker ps
            sleep 15
            curl -f http://localhost:3000 && echo "Application deployed successfully!" || echo "Deployment failed!"
          ENDSSH

      # FIXED: No cleanup step needed — ssh-agent manages its own lifecycle

  # Job 4: Notification
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "Deployment to EC2 successful!"
          else
            echo "Deployment failed or was skipped"
          fi
